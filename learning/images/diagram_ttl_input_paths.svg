<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1d4ed8"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; }
    .title { font: 700 30px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #111827; }
    .subtitle { font: 700 24px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #111827; }
    .text { font: 20px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #374151; }
    .note { font: 700 20px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #b91c1c; }
    .wire { stroke: #111827; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .path { stroke: #1d4ed8; stroke-width: 6; fill: none; marker-end: url(#arrow-blue); }
    .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
    .box { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 16; }
    .muted { stroke: #94a3b8; stroke-width: 4; fill: none; stroke-dasharray: 9 8; }
    .dot { fill: #111827; }
  </style>

  <rect class="bg" width="980" height="560"/>
  <text class="title" x="30" y="44">TTL 输入级里，Q1 不只是“普通 NPN 开关”，它还在做电流转向</text>

  <rect class="panel" x="30" y="82" width="430" height="430"/>
  <rect class="panel" x="520" y="82" width="430" height="430"/>

  <text class="subtitle" x="64" y="122">输入 LOW (0 V)</text>
  <line class="wire" x1="162" y1="146" x2="162" y2="190"/>
  <polyline class="wire" points="162,190 148,210 176,230 148,250 176,270 148,290 162,310"/>
  <line class="wire" x1="162" y1="310" x2="162" y2="330"/>
  <circle class="dot" cx="162" cy="330" r="6"/>
  <rect class="box" x="114" y="330" width="96" height="62"/>
  <text class="subtitle" x="143" y="368">Q1</text>
  <line class="wire" x1="114" y1="360" x2="54" y2="360"/>
  <line class="wire" x1="210" y1="360" x2="310" y2="360"/>
  <line class="wire" x1="162" y1="392" x2="162" y2="440"/>
  <text class="text" x="140" y="140">Vcc</text>
  <text class="text" x="182" y="260">R1</text>
  <text class="text" x="38" y="350">输入</text>
  <text class="text" x="26" y="382">LOW</text>
  <text class="text" x="320" y="350">到 Q2</text>
  <text class="text" x="320" y="382">基极</text>
  <text class="text" x="124" y="466">GND</text>
  <path class="path" d="M162 150 L162 325"/>
  <path class="path" d="M106 360 L66 360"/>
  <path class="path" d="M66 360 L66 442"/>
  <text class="note" x="50" y="420">B-E 正向偏置</text>
  <text class="text" x="50" y="452">R1 提供的电流被 Q1 引到输入端。</text>
  <text class="text" x="50" y="482">所以右边的 Q2 几乎拿不到驱动，</text>
  <text class="text" x="50" y="510">你图里看到的就是 I_C ≈ 0。</text>
  <path class="muted" d="M218 360 L314 360"/>

  <text class="subtitle" x="554" y="122">输入 HIGH</text>
  <line class="wire" x1="652" y1="146" x2="652" y2="190"/>
  <polyline class="wire" points="652,190 638,210 666,230 638,250 666,270 638,290 652,310"/>
  <line class="wire" x1="652" y1="310" x2="652" y2="330"/>
  <circle class="dot" cx="652" cy="330" r="6"/>
  <rect class="box" x="604" y="330" width="96" height="62"/>
  <text class="subtitle" x="633" y="368">Q1</text>
  <line class="wire" x1="604" y1="360" x2="544" y2="360"/>
  <line class="wire" x1="700" y1="360" x2="808" y2="360"/>
  <line class="wire" x1="808" y1="360" x2="808" y2="442"/>
  <text class="text" x="630" y="140">Vcc</text>
  <text class="text" x="672" y="260">R1</text>
  <text class="text" x="528" y="350">输入</text>
  <text class="text" x="518" y="382">HIGH</text>
  <text class="text" x="818" y="350">Q2</text>
  <text class="text" x="820" y="382">基极</text>
  <text class="text" x="772" y="470">到地</text>
  <path class="path" d="M652 150 L652 325"/>
  <path class="path" d="M706 360 L800 360"/>
  <path class="path" d="M808 368 L808 438"/>
  <path class="muted" d="M598 360 L548 360"/>
  <text class="note" x="540" y="420">B-E 反向偏置，B-C 正向偏置</text>
  <text class="text" x="540" y="452">电流不再走向输入端，而是从 Q1 的基极节点</text>
  <text class="text" x="540" y="482">被“转向”到集电极，再去驱动 Q2。</text>
  <text class="text" x="540" y="512">这就是你看到“基极电流往下走”的原因。</text>
</svg>
