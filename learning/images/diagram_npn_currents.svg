<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" viewBox="0 0 860 460">
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1d4ed8"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #ffffff; }
    .title { font: 700 28px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #111827; }
    .label { font: 600 22px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #111827; }
    .text { font: 20px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #374151; }
    .note { font: 700 20px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #b91c1c; }
    .formula { font: 700 24px 'Noto Sans Mono', 'Consolas', monospace; fill: #0f172a; }
    .wire { stroke: #111827; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .current { stroke: #1d4ed8; stroke-width: 6; fill: none; marker-end: url(#arrow-blue); }
    .box { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
  </style>

  <rect class="bg" width="860" height="460"/>
  <text class="title" x="36" y="48">普通 NPN 三极管：先分清哪个是“控制电流”，哪个是“主电流”</text>

  <line class="wire" x1="520" y1="92" x2="520" y2="176"/>
  <line class="wire" x1="520" y1="176" x2="446" y2="238"/>
  <line class="wire" x1="432" y1="166" x2="432" y2="326"/>
  <line class="wire" x1="246" y1="246" x2="388" y2="246"/>
  <line class="wire" x1="446" y1="258" x2="532" y2="346"/>
  <path class="current" d="M520 58 L520 140"/>
  <path class="current" d="M154 246 L226 246"/>
  <path class="current" d="M468 286 L538 356"/>

  <text class="label" x="540" y="106">C</text>
  <text class="label" x="210" y="236">B</text>
  <text class="label" x="546" y="364">E</text>

  <text class="label" x="560" y="74" fill="#1d4ed8">I_C</text>
  <text class="label" x="80" y="236" fill="#1d4ed8">I_B</text>
  <text class="label" x="566" y="334" fill="#1d4ed8">I_E</text>

  <rect class="box" x="586" y="90" width="238" height="264"/>
  <text class="formula" x="616" y="138">I_E = I_B + I_C</text>
  <text class="formula" x="616" y="182">有源区: I_C ≈ β I_B</text>
  <text class="text" x="616" y="232">B 端的小电流不是“变成了” C-E 电流，</text>
  <text class="text" x="616" y="264">而是让更大的 C-E 电流得以建立。</text>
  <text class="text" x="616" y="308">当作开关时，若进入饱和区，</text>
  <text class="text" x="616" y="340">I_C 主要由外部负载与电源决定。</text>

  <text class="note" x="58" y="392">对 NPN 来说，常见的“导通条件”是：</text>
  <text class="note" x="58" y="424">V_BE 大约达到 0.7 V，表示 B-E 结被正向偏置。</text>
</svg>
